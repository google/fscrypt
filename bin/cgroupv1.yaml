# Minimal Lima VM running Ubuntu 20.04 (Focal) for cgroup v1 testdata generation.
#
# Ubuntu 20.04 uses cgroup v1 by default, so no kernel parameter changes are
# needed. Docker is installed via a provisioning script so that containers can
# be launched with --cpus / --memory resource limits.
#
# Usage:
#   limactl start --name=cgroupv1 bin/cgroupv1.yaml
#   bin/generate-cgroupv1-testdata
#   limactl stop cgroupv1          # when done

images:
  - location: "https://cloud-images.ubuntu.com/releases/20.04/release/ubuntu-20.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/20.04/release/ubuntu-20.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 2
memory: "2GiB"
disk: "10GiB"

mounts:
  - location: "~"
    writable: true

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if command -v docker &>/dev/null; then
        exit 0
      fi
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq ca-certificates curl gnupg lsb-release >/dev/null
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo \
        "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
        > /etc/apt/sources.list.d/docker.list
      apt-get update -qq
      apt-get install -y -qq docker-ce docker-ce-cli containerd.io >/dev/null
      usermod -aG docker "{{.User}}"

probes:
  - mode: readiness
    description: docker to be ready
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 60s bash -c "until sudo docker info &>/dev/null; do sleep 3; done"; then
        echo >&2 "docker is not ready yet"
        exit 1
      fi
